<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="theme-color" content="#000000"/><meta name="description" content="Ketcher is a web-based chemical structure editor"/><link rel="shortcut icon" type="image/x-icon" href="./favicon.ico"/><link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png"/><link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png"/><link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png"/><link rel="manifest" href="./manifest.json"/><title>Ketcher v3.7.0</title><script defer="defer" src="./static/js/main.8617f334.js"></script><link href="./static/css/main.748bd42d.css" rel="stylesheet"></head><body><noscript>You need to enable JavaScript to run this app.</noscript><div id="root"></div>
<!-- CHEMLENS Route1 Guard: hide reaction UI affordances (best-effort) -->
<style>
  /* Ketcher 3.x: best-effort selectors across builds/locales */
  [data-testid*="reaction"],
  [data-testid*="arrow"],
  [aria-label*="Reaction"],
  [title*="Reaction"],
  [aria-label*="reaction"],
  [title*="reaction"] { display:none !important; }
</style>

<!-- CHEMLENS_KETCHER_BRIDGE v3 (PING-PONG / Smart RXN fallback / Bulletproof) -->
<script>
(() => {
  const ORIGIN = window.location.origin;
  const READY_TYPE = "KETCHER_READY";
  const ERROR_TYPE = "KETCHER_ERROR";
  const DATA_TYPE  = "KETCHER_DATA";

  const MAX_WAIT_MS = 20000;
  const START = Date.now();

  let isInternalReady = false;
  // IMPORTANT:
  // - Never rely on a one-shot READY.
  // - Parent runs a PING loop; iframe must answer READY EVERY TIME once ready.

  function post(msg, targetOrigin) {
    try { window.parent && window.parent.postMessage(msg, targetOrigin); } catch (e) {}
  }

  function sendReady() {
    post({ type: READY_TYPE }, "*");
  }

  function sendError(payload, requestId) {
    post({ type: ERROR_TYPE, requestId, payload: String(payload || "UNKNOWN") }, "*");
  }

  async function probeInternalReady() {
    const k = window.ketcher;
    if (!k) return false;
    try {
      // Some builds expose ketcher before WASM fully loads.
      // getSmiles() is a practical readiness probe.
      if (typeof k.getSmiles === "function") {
        await k.getSmiles();
      }
      return true;
    } catch (e) {
      return false;
    }
  }

  async function handleCommand(data) {
    const { type, requestId, payload } = data || {};

    if (type === "PING") {
      // Only answer when fully ready. Parent will keep PINGing until READY.
      post({ type: "PONG" }, "*");
      if (isInternalReady) sendReady();
      return;
    }

    const k = window.ketcher;
    if (!k || !isInternalReady) {
      return sendError("KETCHER_NOT_READY", requestId);
    }

    try {
      if (type === "SET_MOLECULE") {
        // payload: { smiles?: string, molfile?: string }
        if (payload && payload.molfile && typeof k.setMolfile === "function") {
          await k.setMolfile(payload.molfile);
        } else if (payload && payload.smiles && typeof k.setMolecule === "function") {
          await k.setMolecule(payload.smiles);
        } else {
          throw new Error("SET_MOLECULE payload missing smiles/molfile OR unsupported API");
        }
        // optional: parent may ignore ACK
        return;
      }

      if (type === "GET_MOLECULE") {
        const [smiles, mol] = await Promise.all([
          typeof k.getSmiles === "function" ? k.getSmiles() : Promise.resolve(""),
          typeof k.getMolfile === "function" ? k.getMolfile() : Promise.resolve("")
        ]);
        post({ type: DATA_TYPE, requestId, payload: { smiles: smiles || "", mol: mol || "" } }, "*");
        return;
      }

      if (type === "GET_SMILES") {
        // payload: { reaction?: boolean }
        let smiles = "";
        if (typeof k.getSmiles === "function") {
          const wantReaction = !!(payload && payload.reaction);
          try {
            // Many Ketcher builds support getSmiles(true) => reaction smiles (A.B>>C).
            smiles = wantReaction ? await k.getSmiles(true) : await k.getSmiles();
          } catch {
            // Fallback: if signature differs, retry without args.
            smiles = await k.getSmiles();
          }
        }
        post({ type: DATA_TYPE, requestId, payload: { smiles: smiles || "", mol: "" } }, "*");
        return;
      }

      if (type === "GET_MOLFILE") {
        const mol = typeof k.getMolfile === "function" ? await k.getMolfile() : "";
        post({ type: DATA_TYPE, requestId, payload: { smiles: "", mol: mol || "" } }, "*");
        return;
      }

      // Unknown command
      sendError("UNKNOWN_COMMAND: " + type, requestId);
    } catch (err) {
      sendError((err && err.message) ? err.message : err, requestId);
    }
  }

  window.addEventListener("message", (e) => {
    if (!e.data || typeof e.data !== "object") return;
    handleCommand(e.data);
  });

  // Poll until truly ready (NOT just window.ketcher existence)
  const timer = setInterval(async () => {
    if (!isInternalReady) {
      isInternalReady = await probeInternalReady();
      if (isInternalReady) {
        // Do NOT rely on this 1-shot READY. Parent may miss it (StrictMode/HMR).
        // Parent-driven PING will still complete the handshake.
        sendReady();
        clearInterval(timer);
      }
    }
    if (!isInternalReady && Date.now() - START > MAX_WAIT_MS) {
      clearInterval(timer);
      sendError("INIT_TIMEOUT");
    }
  }, 100);
})();
</script>

</body></html>
